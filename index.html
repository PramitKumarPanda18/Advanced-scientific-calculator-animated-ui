<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles"></div>

<div class="app">

<div class="calculator">

<div class="top-bar">
<button id="modeToggle">DEG</button>
<button id="clearHistory">Clear History</button>
</div>

<input type="text" class="display" readonly value="0">

<div class="buttons">

<button class="clear">C</button>
<button class="backspace">⌫</button>
<button>(</button>
<button>)</button>
<button>÷</button>
<button>sin</button>

<button>cos</button>
<button>tan</button>
<button>log</button>
<button>√</button>
<button>π</button>
<button>e</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button>×</button>
<button>^</button>
<button>−</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>+</button>
<button>.</button>
<button>1</button>

<button>2</button>
<button>3</button>
<button style="grid-column: span 2;">0</button>
<button class="equals" style="grid-column: span 3;">=</button>

</div>

</div>

<div class="history">

<h3>History</h3>
<ul id="historyList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
